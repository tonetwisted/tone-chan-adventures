<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Tone Chan's Adventures — Play Demo</title>
  <style>
    /* ── Reset ───────────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #1a0a2e;
      font-family: sans-serif;
      -webkit-tap-highlight-color: transparent;
      touch-action: none;
    }

    /* ── App shell ───────────────────────────────────────────────────────── */
    #app {
      display: flex;
      flex-direction: column;
      width: 100%;
      height: 100dvh;
      max-width: 480px;
      margin: 0 auto;
    }

    /* ── Game screen ─────────────────────────────────────────────────────── */
    #screen-wrap {
      flex-shrink: 0;
      width: 100%;
      background: #000;
    }

    /* GBC native resolution is 160×144 → aspect ratio 10:9 */
    #game {
      width: 100%;
      aspect-ratio: 10 / 9;
      display: block;
      background: #0a0a14;
    }

    /* ── Controls panel ──────────────────────────────────────────────────── */
    #controls {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      background: linear-gradient(180deg, #0d0820 0%, #050510 100%);
      gap: 6px;
      min-height: 0;
    }

    /* ── D-pad ───────────────────────────────────────────────────────────── */
    #dpad {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(3, 1fr);
      gap: 3px;
      width:  clamp(96px, 26vw, 128px);
      height: clamp(96px, 26vw, 128px);
      flex-shrink: 0;
    }

    .dpad-btn {
      background: #2a0845;
      border: none;
      border-radius: 6px;
      color: rgba(255, 255, 255, 0.65);
      font-size: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      user-select: none;
      touch-action: none;
    }

    .dpad-empty { /* spacer cells */ }

    .dpad-center {
      background: #1a0533;
      border-radius: 4px;
    }

    .dpad-btn.pressed {
      background: #7B2FBE;
      color: #fff;
    }

    /* ── SELECT / START ──────────────────────────────────────────────────── */
    #center-btns {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      flex: 1;
    }

    .menu-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .menu-btn {
      background: #3a3a5a;
      border: none;
      border-radius: 20px;
      width:  clamp(44px, 12vw, 58px);
      height: clamp(13px,  3vw, 16px);
      cursor: pointer;
      user-select: none;
      touch-action: none;
    }

    .menu-btn.pressed { background: #7B2FBE; }

    .menu-label {
      font-size: 8px;
      letter-spacing: 1.5px;
      color: rgba(255, 255, 255, 0.3);
      text-transform: uppercase;
      font-family: monospace;
    }

    /* ── A / B cluster ───────────────────────────────────────────────────── */
    #ab-cluster {
      position: relative;
      flex-shrink: 0;
      width:  clamp(100px, 28vw, 130px);
      height: clamp(96px,  26vw, 128px);
    }

    .ab-btn {
      position: absolute;
      border: none;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 14px;
      color: #fff;
      cursor: pointer;
      user-select: none;
      touch-action: none;
      transition: transform 0.06s, filter 0.06s;
    }

    #btn-a {
      top: 0; right: 0;
      width:  clamp(50px, 14vw, 64px);
      height: clamp(50px, 14vw, 64px);
      background: #e60073;
      box-shadow: 0 0 14px rgba(230, 0, 115, 0.5);
    }

    #btn-b {
      bottom: 0; left: 0;
      width:  clamp(50px, 14vw, 64px);
      height: clamp(50px, 14vw, 64px);
      background: #a0004a;
    }

    .ab-btn.pressed {
      transform: scale(0.90);
      filter: brightness(1.5);
    }

    /* ── Hide any EmulatorJS built-in touch overlay ───────────────────────── */
    .ejs-virtualGamepad,
    .ejs_virtualGamepad,
    [class*="virtualGamepad"],
    [id*="virtualGamepad"] {
      display: none !important;
    }
  </style>
</head>
<body>
  <div id="app">

    <!-- ── Game screen ─────────────────────────────────────────────────── -->
    <div id="screen-wrap">
      <div id="game"></div>
    </div>

    <!-- ── Custom touch controls ──────────────────────────────────────── -->
    <div id="controls">

      <!-- D-pad -->
      <div id="dpad">
        <div class="dpad-empty"></div>
        <button class="dpad-btn" data-key="ArrowUp">▲</button>
        <div class="dpad-empty"></div>

        <button class="dpad-btn" data-key="ArrowLeft">◄</button>
        <div class="dpad-center"></div>
        <button class="dpad-btn" data-key="ArrowRight">►</button>

        <div class="dpad-empty"></div>
        <button class="dpad-btn" data-key="ArrowDown">▼</button>
        <div class="dpad-empty"></div>
      </div>

      <!-- Select / Start -->
      <div id="center-btns">
        <div class="menu-wrap">
          <button class="menu-btn" id="btn-select" data-key="Shift"></button>
          <span class="menu-label">SELECT</span>
        </div>
        <div class="menu-wrap">
          <button class="menu-btn" id="btn-start" data-key="Enter"></button>
          <span class="menu-label">START</span>
        </div>
      </div>

      <!-- A / B -->
      <div id="ab-cluster">
        <button class="ab-btn" id="btn-a" data-key="x">A</button>
        <button class="ab-btn" id="btn-b" data-key="z">B</button>
      </div>

    </div>
  </div>

  <!-- ── EmulatorJS config — must come BEFORE loader.js ─────────────── -->
  <script>
    var EJS_player        = "#game";
    var EJS_core          = "gambatte";          // Game Boy Color core
    // Absolute URL required — CDN iframe resolves relative paths against cdn.emulatorjs.org
    var EJS_gameUrl       = window.location.origin + "/roms/tone-chan-demo.gbc";
    var EJS_pathtodata    = "https://cdn.emulatorjs.org/stable/data/";  // CDN
    var EJS_startOnLoaded = true;
    var EJS_VirtualGamepad = false;              // disable built-in overlay
    var EJS_mobileControls = false;              // legacy alias
    var EJS_Buttons = {
      playPause: false,
      restart: false,
      mute: true,
      settings: false,
      fullscreen: true,
      saveState: false,
      loadState: false,
      screenRecord: false,
      gamepad: false,
      cheat: false,
      volume: false,
      saveSavFiles: false,
      loadSavFiles: false,
      quickSave: false,
      quickLoad: false,
      screenshot: false,
      cacheManager: false,
    };
  </script>

  <!-- ── Button wiring — dispatches keyboard events ─────────────────── -->
  <script>
    function sendKey(key, down) {
      var type  = down ? "keydown" : "keyup";
      var opts  = { key: key, bubbles: true, cancelable: true };

      // Dispatch on the top-level document
      document.dispatchEvent(new KeyboardEvent(type, opts));

      // Also dispatch inside any same-origin iframes EmulatorJS created
      document.querySelectorAll("iframe").forEach(function (f) {
        try {
          if (f.contentDocument) {
            f.contentDocument.dispatchEvent(new KeyboardEvent(type, opts));
          }
        } catch (e) { /* cross-origin — skip */ }
      });
    }

    function wireButton(el) {
      var key = el.dataset.key;

      function onPress(e) {
        e.preventDefault();
        el.classList.add("pressed");
        sendKey(key, true);
      }

      function onRelease(e) {
        e.preventDefault();
        el.classList.remove("pressed");
        sendKey(key, false);
      }

      el.addEventListener("touchstart",  onPress,   { passive: false });
      el.addEventListener("touchend",    onRelease, { passive: false });
      el.addEventListener("touchcancel", onRelease, { passive: false });
      el.addEventListener("mousedown",   onPress);
      el.addEventListener("mouseup",     onRelease);
      el.addEventListener("mouseleave",  onRelease);
    }

    document.querySelectorAll("[data-key]").forEach(wireButton);
  </script>

  <!-- ── EmulatorJS loader — must be LAST ───────────────────────────── -->
  <script src="https://cdn.emulatorjs.org/stable/data/loader.js"></script>
</body>
</html>
